# ── dvc.yaml ────────────────────────────────────────
# Defines the reproducible ML pipeline.
# Run with: dvc repro

stages:

  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
    params:
      - data.raw_path
    outs:
      - data/raw/reddit_comments.csv

  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - data/raw/reddit_comments.csv
    params:
      - data.raw_path
      - data.processed_path
      - data.test_size
      - data.random_state
      - preprocessing
    outs:
      - data/processed/comments_clean.csv
      - data/processed/train.csv
      - data/processed/test.csv

  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
      - src/feature_engineering.py
      - data/processed/train.csv
      - data/processed/test.csv
    params:
      - feature_engineering
      - imbalance
    outs:
      - data/features/X_train.pkl
      - data/features/X_test.pkl
      - data/features/y_train.pkl
      - data/features/y_test.pkl
      - models/vectorizer.pkl

  model_training:
    cmd: python src/model_training.py
    deps:
      - src/model_training.py
      - data/features/X_train.pkl
      - data/features/y_train.pkl
    params:
      - model
      - mlflow
      - imbalance
    outs:
      - models/model.pkl
    metrics:
      - reports/train_metrics.json:
          cache: false

  model_evaluation:
    cmd: python src/model_evaluation.py
    deps:
      - src/model_evaluation.py
      - models/model.pkl
      - models/vectorizer.pkl
      - data/features/X_test.pkl
      - data/features/y_test.pkl
    params:
      - evaluation
      - mlflow
    metrics:
      - reports/eval_metrics.json:
          cache: false
    plots:
      - reports/confusion_matrix.csv:
          cache: false

  register_model:
    cmd: python src/register_model.py
    deps:
      - src/register_model.py
      - models/model.pkl
      - models/vectorizer.pkl
      - reports/eval_metrics.json
    params:
      - mlflow
      - evaluation
