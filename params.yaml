# ── params.yaml ─────────────────────────────────────
# All tunable parameters for the DVC pipeline.
# Change values here → DVC auto-detects & reruns affected stages.

data:
  raw_path: data/raw/reddit_comments.csv
  processed_path: data/processed/comments_clean.csv
  test_size: 0.2
  random_state: 42

preprocessing:
  min_comment_length: 3      # drop comments shorter than N words
  remove_urls: true
  remove_emojis: false       # keep emojis — they carry sentiment signal

feature_engineering:
  method: tfidf              # options: tfidf | bow | word2vec
  max_features: 50000
  ngram_range: [1, 2]        # unigrams + bigrams
  sublinear_tf: true

imbalance:
  strategy: class_weight     # options: class_weight | smote | adasyn | undersample

model:
  algorithm: lightgbm        # options: lightgbm | xgboost | random_forest | logistic_regression
  n_estimators: 367
  learning_rate: 0.08
  max_depth: 20
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1

mlflow:
  tracking_uri: http://localhost:5001   # replace with EC2 URI
  experiment_name: yt_sentiment_v1
  registered_model_name: yt_sentiment_model

evaluation:
  accuracy_threshold: 0.82
  f1_threshold: 0.78
  recall_neg_threshold: 0.70   # recall for class -1 (negative)
